# GitHub Actions Workflow for MNN Android Library Compilation (Matrix Build)
# 参考: https://github.com/alibaba/MNN/tree/master/.github/workflows
#
# 特点：
# - 使用矩阵构建，并行编译多个架构
# - 编译速度更快
# - 支持手动触发自定义参数

name: Build MNN Android (Matrix)

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      min_sdk_version:
        description: '最低 SDK 版本'
        required: false
        default: '21'
        type: string
      enable_opencl:
        description: '启用 OpenCL GPU 加速'
        required: false
        default: true
        type: boolean
      enable_vulkan:
        description: '启用 Vulkan 后端'
        required: false
        default: true
        type: boolean
      enable_opengl:
        description: '启用 OpenGL 后端'
        required: false
        default: true
        type: boolean
      enable_opencv:
        description: '启用 OpenCV 图像处理'
        required: false
        default: true
        type: boolean
      enable_audio:
        description: '启用 Audio 音频处理'
        required: false
        default: true
        type: boolean
      enable_llm:
        description: '启用 LLM 大模型支持'
        required: false
        default: true
        type: boolean
      enable_nnapi:
        description: '启用 NNAPI 后端'
        required: false
        default: false
        type: boolean
      build_arm64:
        description: '编译 arm64-v8a'
        required: false
        default: true
        type: boolean
      build_arm32:
        description: '编译 armeabi-v7a'
        required: false
        default: true
        type: boolean
      build_x86:
        description: '编译 x86'
        required: false
        default: false
        type: boolean
      build_x86_64:
        description: '编译 x86_64'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NDK_VERSION: 'r26d'

jobs:
  # 编译阶段：并行编译各架构
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.build_arm64 }}
            arm82: ON
          - arch: armeabi-v7a
            enabled: ${{ github.event_name != 'workflow_dispatch' || inputs.build_arm32 }}
            arm82: OFF
          - arch: x86
            enabled: ${{ github.event_name == 'workflow_dispatch' && inputs.build_x86 }}
            arm82: OFF
          - arch: x86_64
            enabled: ${{ github.event_name == 'workflow_dispatch' && inputs.build_x86_64 }}
            arm82: OFF
    
    # 只在启用时运行
    if: ${{ matrix.enabled == true }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Set environment
        run: |
          echo "ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git zip

      - name: Set build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "build_type=${{ inputs.build_type }}" >> $GITHUB_OUTPUT
            echo "min_sdk_version=${{ inputs.min_sdk_version }}" >> $GITHUB_OUTPUT
            echo "enable_opencl=${{ inputs.enable_opencl }}" >> $GITHUB_OUTPUT
            echo "enable_vulkan=${{ inputs.enable_vulkan }}" >> $GITHUB_OUTPUT
            echo "enable_opengl=${{ inputs.enable_opengl }}" >> $GITHUB_OUTPUT
            echo "enable_opencv=${{ inputs.enable_opencv }}" >> $GITHUB_OUTPUT
            echo "enable_audio=${{ inputs.enable_audio }}" >> $GITHUB_OUTPUT
            echo "enable_llm=${{ inputs.enable_llm }}" >> $GITHUB_OUTPUT
            echo "enable_nnapi=${{ inputs.enable_nnapi }}" >> $GITHUB_OUTPUT
          else
            echo "build_type=Release" >> $GITHUB_OUTPUT
            echo "min_sdk_version=21" >> $GITHUB_OUTPUT
            echo "enable_opencl=true" >> $GITHUB_OUTPUT
            echo "enable_vulkan=true" >> $GITHUB_OUTPUT
            echo "enable_opengl=true" >> $GITHUB_OUTPUT
            echo "enable_opencv=true" >> $GITHUB_OUTPUT
            echo "enable_audio=true" >> $GITHUB_OUTPUT
            echo "enable_llm=true" >> $GITHUB_OUTPUT
            echo "enable_nnapi=false" >> $GITHUB_OUTPUT
          fi

      - name: Build MNN for ${{ matrix.arch }}
        run: |
          ARCH="${{ matrix.arch }}"
          ABI="${ARCH}"
          ARM82="${{ matrix.arm82 }}"
          API_LEVEL="android-${{ steps.params.outputs.min_sdk_version }}"
          
          echo "Building for $ABI, API Level: $API_LEVEL, ARM82: $ARM82"
          
          mkdir -p build_${ABI}
          cd build_${ABI}
          
          # 构建额外参数
          EXTRA_ARGS=""
          [ "${{ steps.params.outputs.enable_opencl }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_OPENCL=ON"
          [ "${{ steps.params.outputs.enable_vulkan }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_VULKAN=ON"
          [ "${{ steps.params.outputs.enable_opengl }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_OPENGL=ON"
          [ "${{ steps.params.outputs.enable_opencv }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_BUILD_OPENCV=ON -DMNN_IMGCODECS=ON"
          [ "${{ steps.params.outputs.enable_audio }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_BUILD_AUDIO=ON"
          [ "${{ steps.params.outputs.enable_llm }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_BUILD_LLM=ON -DMNN_LOW_MEMORY=ON -DMNN_SUPPORT_TRANSFORMER_FUSE=ON"
          [ "${{ steps.params.outputs.enable_nnapi }}" == "true" ] && EXTRA_ARGS="$EXTRA_ARGS -DMNN_NNAPI=ON"
          
          # 执行 CMake 配置 - 参考官方脚本
          cmake ../ \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=${{ steps.params.outputs.build_type }} \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_STL=c++_static \
            -DANDROID_NATIVE_API_LEVEL=${API_LEVEL} \
            -DMNN_USE_LOGCAT=false \
            -DMNN_USE_SSE=OFF \
            -DMNN_BUILD_TEST=OFF \
            -DMNN_BUILD_BENCHMARK=OFF \
            -DMNN_ARM82=${ARM82} \
            -DMNN_BUILD_FOR_ANDROID_COMMAND=true \
            -DMNN_BUILD_SHARED_LIBS=ON \
            -DMNN_BUILD_TRAIN=OFF \
            -DMNN_BUILD_DEMO=OFF \
            -DMNN_BUILD_TOOLS=OFF \
            -DMNN_BUILD_QUANTOOLS=OFF \
            -DMNN_EVALUATION=OFF \
            -DMNN_BUILD_CONVERTER=OFF \
            -DNATIVE_LIBRARY_OUTPUT=. \
            -DNATIVE_INCLUDE_OUTPUT=. \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ${EXTRA_ARGS}
          
          make -j$(nproc)
          
          # 收集产物
          mkdir -p ../artifacts/${ABI}
          find . -name "*.so" -exec cp -v {} ../artifacts/${ABI}/ \;
          
          # 收集头文件
          mkdir -p ../artifacts/include
          [ -d "../include" ] && cp -rv ../include/* ../artifacts/include/ 2>/dev/null || true
          [ -d "../source/include" ] && cp -rv ../source/include/* ../artifacts/include/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mnn-${{ matrix.arch }}
          path: artifacts/
          retention-days: 7

  # 合并阶段：合并所有架构的产物
  combine:
    name: Combine Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts
          pattern: mnn-*
          merge-multiple: false
        continue-on-error: true

      - name: Combine libraries
        run: |
          mkdir -p output/libs
          
          # 合并所有架构的 so 文件
          if [ -d "all_artifacts" ]; then
            for dir in all_artifacts/mnn-*/; do
              if [ -d "$dir" ]; then
                # 查找 ABI 目录
                for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
                  if [ -d "${dir}${ABI}" ]; then
                    mkdir -p "output/libs/${ABI}"
                    cp -rv "${dir}${ABI}"/*.so "output/libs/${ABI}/" 2>/dev/null || true
                  fi
                done
                
                # 复制头文件
                if [ -d "${dir}include" ]; then
                  mkdir -p output/include
                  cp -rv ${dir}include/* output/include/ 2>/dev/null || true
                fi
              fi
            done
          fi
          
          # 创建构建信息
          cat > output/BUILD_INFO.txt << EOF
          MNN Android Library Build
          =========================
          Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Git Commit: ${{ github.sha }}
          Git Ref: ${{ github.ref }}
          EOF
          
          # 显示产物
          echo "Final artifacts:"
          find output -type f -name "*.so" -exec ls -lh {} \;

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mnn-android-all-${{ github.run_number }}
          path: output/
          retention-days: 30
