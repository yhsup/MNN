name: MNN Android Build & APK Release
# 触发规则：push到主分支、PR到主分支、支持手动触发
on:
  push:
    branches: [ master, main ]
    paths:
      - 'source/**'
      - 'express/**'
      - 'include/**'
      - 'project/android/**'
      - '3rd_party/**'
      - '.github/workflows/android-mnn-build-apk.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'source/**'
      - 'express/**'
      - 'include/**'
      - 'project/android/**'
      - '3rd_party/**'
      - '.github/workflows/android-mnn-build-apk.yml'
  workflow_dispatch: # 支持手动触发运行

# 并发控制：同一分支仅保留一个运行中的任务，避免资源浪费
concurrency:
  group: android-mnn-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-mnn-android:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（含子模块依赖）
      - name: Checkout MNN Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 拉取3rd_party等子模块依赖，避免编译缺失
          fetch-depth: 1

      # 2. 安装编译依赖环境
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make gcc g++ ninja-build zip unzip

      # 3. 编译arm64-v8a 64位so库（完全复用官方workflow的编译参数）
      - name: Build MNN Android arm64-v8a Libraries
        run: |
          cd project/android
          mkdir -p build_64
          cd build_64
          ../build_64.sh \
            -DMNN_LOW_MEMORY=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DLLM_SUPPORT_VISION=true \
            -DMNN_BUILD_OPENCV=true \
            -DMNN_IMGCODECS=true \
            -DLLM_SUPPORT_AUDIO=true \
            -DMNN_BUILD_AUDIO=true \
            -DMNN_SUPPORT_BF16=ON

      # 4. 编译armeabi-v7a 32位so库（完全复用官方workflow的编译参数）
      - name: Build MNN Android armeabi-v7a Libraries
        run: |
          cd project/android
          mkdir -p build_32
          cd build_32
          ../build_32.sh \
            -DMNN_LOW_MEMORY=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DLLM_SUPPORT_AUDIO=true \
            -DMNN_BUILD_AUDIO=true \
            -DLLM_SUPPORT_VISION=true \
            -DMNN_BUILD_OPENCV=true \
            -DMNN_IMGCODECS=true

      # 5. 整理编译好的so库，标准化Android jniLibs目录结构
      - name: Collect Compiled MNN Libraries
        run: |
          # 创建输出目录
          mkdir -p mnn_android_libs/arm64-v8a
          mkdir -p mnn_android_libs/armeabi-v7a
          
          # 复制全量so库（适配所有开启的编译功能）
          cp project/android/build_64/lib*.so mnn_android_libs/arm64-v8a/
          cp project/android/build_32/lib*.so mnn_android_libs/armeabi-v7a/
          
          # 打印编译结果，方便排查问题
          echo "===== arm64-v8a 编译完成的库 ====="
          ls -lh mnn_android_libs/arm64-v8a/
          echo "===== armeabi-v7a 编译完成的库 ====="
          ls -lh mnn_android_libs/armeabi-v7a/

      # 6. 配置APK构建环境：JDK + Android SDK + NDK
      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # 开启gradle缓存，加速后续构建

      - name: Set Up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          ndk: '25.2.9519653' # 与MNN官方兼容的稳定NDK版本

      # 7. 将编译好的so库复制到Demo项目的jniLibs目录，供APK构建使用
      - name: Copy Libraries to Demo Project
        run: |
          DEMO_JNI_LIBS_PATH=project/android/demo/app/src/main/jniLibs
          # 创建jniLibs目录
          mkdir -p $DEMO_JNI_LIBS_PATH/arm64-v8a
          mkdir -p $DEMO_JNI_LIBS_PATH/armeabi-v7a
          # 复制so库
          cp -r mnn_android_libs/arm64-v8a/* $DEMO_JNI_LIBS_PATH/arm64-v8a/
          cp -r mnn_android_libs/armeabi-v7a/* $DEMO_JNI_LIBS_PATH/armeabi-v7a/
          
          echo "===== Demo项目已注入的库 ====="
          ls -lh $DEMO_JNI_LIBS_PATH/*/

      # 8. 构建Demo APK（默认Debug版本，无需签名即可直接安装）
      - name: Build MNN Demo APK
        run: |
          cd project/android/demo
          chmod +x gradlew
          ./gradlew clean assembleDebug
          
          echo "===== APK构建完成 ====="
          ls -lh app/build/outputs/apk/debug/

      # 9. 上传编译好的MNN so库（可下载复用）
      - name: Upload MNN Android Libraries
        uses: actions/upload-artifact@v4
        with:
          name: mnn-android-libs-all-arch
          path: mnn_android_libs/
          retention-days: 30 # 保留30天，可自行调整（免费版最长90天）

      # 10. 上传构建好的Demo APK
      - name: Upload MNN Demo Android APK
        uses: actions/upload-artifact@v4
        with:
          name: mnn-demo-android-apk
          path: project/android/demo/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
