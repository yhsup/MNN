name: Build MNN Android Demo APK
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      min_sdk_version:
        description: '最低 SDK 版本'
        required: false
        default: '21'
        type: string
      enable_opencl:
        description: '启用 OpenCL GPU 加速'
        required: false
        default: true
        type: boolean
      enable_vulkan:
        description: '启用 Vulkan 后端'
        required: false
        default: true
        type: boolean
      enable_opengl:
        description: '启用 OpenGL 后端'
        required: false
        default: true
        type: boolean
      enable_opencv:
        description: '启用 OpenCV 图像处理'
        required: false
        default: true
        type: boolean
      enable_audio:
        description: '启用 Audio 音频处理'
        required: false
        default: true
        type: boolean
      enable_llm:
        description: '启用 LLM 大模型支持'
        required: false
        default: true
        type: boolean
      enable_nnapi:
        description: '启用 NNAPI 后端'
        required: false
        default: false
        type: boolean
      build_arm64:
        description: '编译 arm64-v8a 架构'
        required: false
        default: true
        type: boolean
      build_arm32:
        description: '编译 armeabi-v7a 架构'
        required: false
        default: true
        type: boolean
      build_x86:
        description: '编译 x86 架构'
        required: false
        default: false
        type: boolean
      build_x86_64:
        description: '编译 x86_64 架构'
        required: false
        default: false
        type: boolean
      apk_abi_type:
        description: 'APK 架构打包类型'
        required: false
        default: 'universal'
        type: choice
        options:
          - universal
          - 64bit
          - 32bit
          - x86_64
          - x86

jobs:
  build-mnn-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 MNN 完整源码（含子模块）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: 配置 JDK 17 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 配置 Android SDK & NDK 编译环境
        uses: android-actions/setup-android@v3
        with:
          packages: |
            build-tools;34.0.0
            platforms;android-34
            ndk;25.2.9519653
          accept-android-sdk-licenses: true

      - name: 全局环境变量初始化
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "CMAKE_BUILD_TYPE=${{ inputs.build_type }}" >> $GITHUB_ENV
          echo "MIN_SDK_VERSION=${{ inputs.min_sdk_version }}" >> $GITHUB_ENV

      - name: 生成 MNN 编译 CMake 参数
        id: cmake-args
        run: |
          # 基础编译参数
          CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake"
          CMAKE_ARGS="$CMAKE_ARGS -DANDROID_PLATFORM=android-$MIN_SDK_VERSION"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_BUILD_FOR_ANDROID=ON"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_BUILD_SHARED_LIBS=ON"
          
          # 功能模块开关映射
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_OPENCL_ENABLE=${{ inputs.enable_opencl && 'ON' || 'OFF' }}"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_VULKAN_ENABLE=${{ inputs.enable_vulkan && 'ON' || 'OFF' }}"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_OPENGL_ENABLE=${{ inputs.enable_opengl && 'ON' || 'OFF' }}"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_OPENCV_ENABLE=${{ inputs.enable_opencv && 'ON' || 'OFF' }}"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_AUDIO_ENABLE=${{ inputs.enable_audio && 'ON' || 'OFF' }}"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_LLM_ENABLE=${{ inputs.enable_llm && 'ON' || 'OFF' }}"
          CMAKE_ARGS="$CMAKE_ARGS -DMNN_NNAPI_ENABLE=${{ inputs.enable_nnapi && 'ON' || 'OFF' }}"
          
          echo "cmake_args=$CMAKE_ARGS" >> $GITHUB_OUTPUT

      - name: 编译 arm64-v8a 架构 SO 库
        if: inputs.build_arm64 == true
        run: |
          mkdir -p build/arm64-v8a && cd build/arm64-v8a
          cmake ${{ steps.cmake-args.outputs.cmake_args }} \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_STL=c++_static \
            ../..
          make -j$(nproc)
          # 复制 SO 到 Demo 对应目录
          mkdir -p ../../project/android/demo/app/src/main/jniLibs/arm64-v8a
          cp libMNN.so ../../project/android/demo/app/src/main/jniLibs/arm64-v8a/
          cp libMNN_*.so ../../project/android/demo/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true

      - name: 编译 armeabi-v7a 架构 SO 库
        if: inputs.build_arm32 == true
        run: |
          mkdir -p build/armeabi-v7a && cd build/armeabi-v7a
          cmake ${{ steps.cmake-args.outputs.cmake_args }} \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_STL=c++_static \
            -DANDROID_ARM_NEON=ON \
            ../..
          make -j$(nproc)
          # 复制 SO 到 Demo 对应目录
          mkdir -p ../../project/android/demo/app/src/main/jniLibs/armeabi-v7a
          cp libMNN.so ../../project/android/demo/app/src/main/jniLibs/armeabi-v7a/
          cp libMNN_*.so ../../project/android/demo/app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true

      - name: 编译 x86 架构 SO 库
        if: inputs.build_x86 == true
        run: |
          mkdir -p build/x86 && cd build/x86
          cmake ${{ steps.cmake-args.outputs.cmake_args }} \
            -DANDROID_ABI=x86 \
            -DANDROID_STL=c++_static \
            ../..
          make -j$(nproc)
          # 复制 SO 到 Demo 对应目录
          mkdir -p ../../project/android/demo/app/src/main/jniLibs/x86
          cp libMNN.so ../../project/android/demo/app/src/main/jniLibs/x86/
          cp libMNN_*.so ../../project/android/demo/app/src/main/jniLibs/x86/ 2>/dev/null || true

      - name: 编译 x86_64 架构 SO 库
        if: inputs.build_x86_64 == true
        run: |
          mkdir -p build/x86_64 && cd build/x86_64
          cmake ${{ steps.cmake-args.outputs.cmake_args }} \
            -DANDROID_ABI=x86_64 \
            -DANDROID_STL=c++_static \
            ../..
          make -j$(nproc)
          # 复制 SO 到 Demo 对应目录
          mkdir -p ../../project/android/demo/app/src/main/jniLibs/x86_64
          cp libMNN.so ../../project/android/demo/app/src/main/jniLibs/x86_64/
          cp libMNN_*.so ../../project/android/demo/app/src/main/jniLibs/x86_64/ 2>/dev/null || true

      - name: 修复 Android 12+ Manifest 导出属性报错
        working-directory: project/android/demo
        run: |
          # 给主入口 Activity（带 LAUNCHER 过滤器）设置 exported=true
          sed -i '/<activity android:name=".MainActivity"/a \            android:exported="true"' app/src/main/AndroidManifest.xml
          # 给报错的 VideoActivity 显式设置 exported=false
          sed -i '/<activity android:name=".VideoActivity"/a \            android:exported="false"' app/src/main/AndroidManifest.xml
          # 兜底：给所有带 intent-filter 的 Activity 补充 exported 属性，彻底避免合并报错
          sed -i '/<activity.*>/!b;n;/<intent-filter>/!b;x;/exported/!{x;s/^\s*<activity/& android:exported="false"/;b};x' app/src/main/AndroidManifest.xml

      - name: 生成本地编译配置 local.properties
        working-directory: project/android/demo
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: 配置 APK 架构过滤规则
        id: abi-filter
        working-directory: project/android/demo
        run: |
          # 根据输入参数生成对应 ABI 过滤规则
          case "${{ inputs.apk_abi_type }}" in
            "64bit")
              ABI_FILTER="arm64-v8a"
              ;;
            "32bit")
              ABI_FILTER="armeabi-v7a"
              ;;
            "x86_64")
              ABI_FILTER="x86_64"
              ;;
            "x86")
              ABI_FILTER="x86"
              ;;
            "universal")
              # 通用版打包所有已开启编译的架构
              ABI_LIST=""
              [ "${{ inputs.build_arm64 }}" == "true" ] && ABI_LIST="$ABI_LIST 'arm64-v8a',"
              [ "${{ inputs.build_arm32 }}" == "true" ] && ABI_LIST="$ABI_LIST 'armeabi-v7a',"
              [ "${{ inputs.build_x86 }}" == "true" ] && ABI_LIST="$ABI_LIST 'x86',"
              [ "${{ inputs.build_x86_64 }}" == "true" ] && ABI_LIST="$ABI_LIST 'x86_64',"
              ABI_FILTER=${ABI_LIST%,}
              ;;
          esac
          
          # 写入 build.gradle 配置
          sed -i "/ndk {/a \            abiFilters $ABI_FILTER" app/build.gradle
          echo "abi_filter=$ABI_FILTER" >> $GITHUB_OUTPUT

      - name: 赋予 gradlew 执行权限
        working-directory: project/android/demo
        run: chmod +x gradlew

      - name: 执行 APK 构建
        working-directory: project/android/demo
        run: ./gradlew assemble${{ inputs.build_type }} --stacktrace

      - name: 上传构建产物 APK
        uses: actions/upload-artifact@v4
        with:
          name: MNN-Demo-${{ inputs.build_type }}-${{ inputs.apk_abi_type }}
          path: project/android/demo/app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          retention-days: 30
